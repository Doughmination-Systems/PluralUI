services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.db
    volumes:
      - ./data/db:/var/lib/postgresql/data
      - ./api/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plural"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 4001
    ports:
      - "127.0.0.1:4001:4001"
    volumes:
      - "./.env:/app/.env:ro"
      - "./.env.keys:/app/.env.keys:ro"

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: http://localhost
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:4000:4000"
